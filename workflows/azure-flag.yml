name: Get Flag
on: [workflow_dispatch]

permissions:
  id-token: write
  contents: read

jobs:
  get-flag:
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v1
        with:
          client-id: 0f7196d5-d393-44f6-96eb-b06cd5312ddc
          tenant-id: fdd066e1-ee37-49bc-b08f-d0e152119b04
          subscription-id: 5ff86dd0-ee91-4f26-901a-158f9242c514
          enable-AzPSSession: true

      - name: Download flag
        run: |
          az storage blob download \
            --account-name <STORAGE_ACCOUNT_NAME> \
            --container-name flag \
            --name flag.txt \
            --file flag.txt \
            --auth-mode login

      - name: Read flag
        run: |
          cat flag.txt
