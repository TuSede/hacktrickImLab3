name: Get Flag
on: [workflow_dispatch]

permissions:
  id-token: write
  contents: read

jobs:
  get-flag:
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v1
        with:
          client-id: <MANAGED_IDENTITY_CLIENT_ID>
          tenant-id: <TENANT_ID>
          subscription-id: <SUBSCRIPTION_ID>
          enable-AzPSSession: true

      - name: Download flag
        run: |
          az storage blob download \
            --account-name <STORAGE_ACCOUNT_NAME> \
            --container-name flag \
            --name flag.txt \
            --file flag.txt \
            --auth-mode login

      - name: Read flag
        run: |
          cat flag.txt
